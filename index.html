<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Spelsamling</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
            padding: 50px 20px;
        }
        h1 {
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .game-link {
            display: block;
            margin: 15px 0;
            padding: 15px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .game-link:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎮 Kolla min spelsamling</h1>
        <p>Trycka att börja spela</p>
        
        <a class="game-link" href="https://wantingwants.github.io/poppa-ballonger/" target="_blank">Poppa Ballanger</a>
        <a class="game-link" href="https://wantingwants.github.io/dragon-boat/" target="_blank">Row Dragon Boat</a>
    </div>

</body>
</html>
