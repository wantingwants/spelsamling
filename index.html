<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Spelsamling</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
            padding: 50px 20px;
        }
        h1 {
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .game-link {
            display: block;
            margin: 15px 0;
            padding: 15px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .game-link:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 瑞典語標題 -->
        <h1>🎮 Mitt Spelbibliotek</h1>
        
        <div class="game-grid">
            
            <!-- 遊戲卡片 1 -->
            <a href="https://wantingwants.github.io/poppa-ballonger/" class="game-card" target="_blank">
                <!-- 將這裡的圖片路徑換成你自己的圖片檔案名稱 -->
                <img src="game1_thumb.jpg" alt="遊戲 1 縮圖">
                <h3>Poppa Ballanger</h3>
            </a>

            <!-- 遊戲卡片 2 -->
            <a href="https://wantingwants.github.io/dragon-boat/" class="game-card" target="_blank">
                <img src="game2_thumb.jpg" alt="遊戲 2 縮圖">
                <h3>Row Dragon Boat</h3>
            </a>

            <!-- 遊戲卡片 3 -->
            <a href="https://wantingwants.github.io/ear-training/" class="game-card" target="_blank">
                <img src="game3_thumb.jpg" alt="遊戲 3 縮圖">
                <h3>Ear Traning</h3>
            </a>

            <!-- 你可以輕鬆地複製上方的 <a> 區塊來增加更多遊戲 -->

        </div>
    </div>

    <div class="container">


</body>
</html>
